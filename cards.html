#main{

.card{
height:300px;
width:230px;
border: 1px solid salmon;
position: absolute;
top:50%;
left:50%;
transform: translate(-50%,-50%);
border-radius:20px;
overflow:hidden;
}

#card2:hover{
z-index:10;}

#card3:hover{
z-index:10;}

#card4:hover{
z-index:10;}




#card1{
background-color:pink;
z-index:4;


}

#card2{
rotate: -7deg;

z-index:3;

}


#card3{
rotate: -14deg;
background-color:green;
z-index:2;

}


#card4{
rotate: -21deg;
background-color:blue;
z-index:1;

}

img{
heigth:100%;
width:100%;
object-fix:cover;
}




</style>

<title>Pokemon Cards</title>

</head>
